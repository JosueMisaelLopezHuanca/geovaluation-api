version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: avalix_db_v2
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=adminavalix
      - POSTGRES_DB=avalix_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_v2:/var/lib/postgresql/data
      # ¡Aquí está la magia! Docker ejecutará el SQL automáticamente
      - ./db_init/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql

volumes:
  pgdata_v2: