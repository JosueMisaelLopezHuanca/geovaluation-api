services:
  - type: web
    name: catastro-api-beta
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v2/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SEARCH_PATH
        sync: false
      - key: CATASTRO_ADMIN_USER
        value: admin
      - key: CATASTRO_ADMIN_PASSWORD
        sync: false
      - key: CATASTRO_AUTH_SECRET
        generateValue: true
      - key: CATASTRO_AUTH_TTL_MINUTES
        value: "240"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOW_LAN
        value: "false"
